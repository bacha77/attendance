<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Sabbath School Attendance</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafgraph/spa-github-pages
        // This script takes the current url and converts it into a query string,
        // then redirects the browser to the index.html page with the query string.
        var pathSegs = 1;
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegs).join('/') + '/?/' +
            l.pathname.split('/').slice(1 + pathSegs).join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body>
</body>

</html>
